<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Park Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a7c59;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --gold: #c9a84c;
  }
  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Tajawal', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(74,124,89,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(26,58,42,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .container {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .logo-wrap {
    width: 150px; height: 150px;
    border-radius: 50%; overflow: hidden;
    border: 4px solid var(--green-dark);
    box-shadow: 0 8px 30px rgba(26,58,42,0.2), 0 0 0 2px var(--gold);
    margin-bottom: 20px;
    animation: fadeDown 0.8s ease both;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .title-block { text-align: center; margin-bottom: 6px; animation: fadeDown 0.9s ease both; }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px; color: var(--green-dark); letter-spacing: 3px;
  }
  .title-block .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 12px; color: var(--gold); letter-spacing: 4px;
    text-transform: uppercase; margin-top: 4px;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 14px 0 6px; width: 100%; animation: fadeDown 1s ease both;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--green-dark), transparent);
  }
  .tagline {
    font-size: 13px; color: var(--green-light); letter-spacing: 2px;
    margin-bottom: 28px; font-style: italic; animation: fadeDown 1s ease both;
  }
  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .link-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px; border-radius: 16px;
    text-decoration: none; transition: all 0.3s ease;
    position: relative; overflow: hidden; border: 1.5px solid transparent;
    cursor: pointer;
  }
  .link-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(26,58,42,0.2); }
  .btn-facebook { background: var(--green-dark); border-color: var(--green-mid); animation: fadeUp 1.1s ease both; }
  .btn-instagram { background: linear-gradient(135deg, var(--green-mid), var(--green-dark)); border-color: var(--gold); animation: fadeUp 1.2s ease both; }
  .btn-menu1 { background: var(--cream-dark); border: 1.5px solid var(--green-dark); animation: fadeUp 1.3s ease both; }
  .btn-menu2 { background: white; border: 1.5px solid var(--green-dark); animation: fadeUp 1.35s ease both; }
  .btn-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .btn-facebook .btn-icon { background: rgba(255,255,255,0.15); }
  .btn-instagram .btn-icon { background: rgba(201,168,76,0.2); }
  .btn-menu1 .btn-icon, .btn-menu2 .btn-icon { background: var(--green-dark); color: white; font-size: 20px; }
  .btn-text { flex: 1; }
  .btn-label { font-size: 16px; font-weight: 700; display: block; }
  .btn-facebook .btn-label, .btn-instagram .btn-label { color: white; }
  .btn-menu1 .btn-label, .btn-menu2 .btn-label { color: var(--green-dark); }
  .btn-sublabel { font-size: 12px; display: block; margin-top: 2px; }
  .btn-facebook .btn-sublabel, .btn-instagram .btn-sublabel { color: rgba(255,255,255,0.6); }
  .btn-menu1 .btn-sublabel, .btn-menu2 .btn-sublabel { color: var(--green-light); }
  .btn-arrow { font-size: 18px; transition: transform 0.3s; }
  .btn-facebook .btn-arrow, .btn-instagram .btn-arrow { color: rgba(255,255,255,0.5); }
  .btn-menu1 .btn-arrow, .btn-menu2 .btn-arrow { color: var(--green-dark); }
  .link-btn:hover .btn-arrow { transform: translateX(-4px); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 100;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }
  .close-bar {
    width: 100%; max-width: 500px;
    padding: 14px 16px 10px;
    display: flex; justify-content: center;
    flex-shrink: 0;
  }
  .modal-close {
    background: var(--green-dark); color: white;
    border: none; border-radius: 30px;
    padding: 10px 36px; font-size: 16px;
    font-family: 'Tajawal', sans-serif; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
  }
  .modal-img {
    width: 100%; max-width: 500px;
    display: none; padding: 0 8px 20px;
  }
  .modal-img.active { display: block; }
  .modal-img img { width: 100%; border-radius: 16px; display: block; }

  /* Footer */
  .footer { margin-top: 28px; text-align: center; animation: fadeUp 1.6s ease both; }
  .footer-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .footer-divider::before, .footer-divider::after { content: ''; flex: 1; height: 1px; background: var(--cream-dark); }
  .footer p { font-size: 11px; color: #aaa; letter-spacing: 1px; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
