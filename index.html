<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Park Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a7c59;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --gold: #c9a84c;
  }

  .leaf {
    position: fixed; pointer-events: none; z-index: 0; opacity: 0;
    animation: leafFall linear infinite;
  }
  .leaf svg { display: block; }
  @keyframes leafFall {
    0%   { transform: translateY(-60px) rotate(0deg) translateX(0px);   opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  body {
    min-height: 100vh; background: var(--cream);
    font-family: 'Tajawal', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 60px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(74,124,89,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(26,58,42,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    width: 100%; max-width: 440px;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
  }
  .logo-wrap {
    width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
    border: 4px solid var(--green-dark);
    box-shadow: 0 8px 30px rgba(26,58,42,0.2), 0 0 0 2px var(--gold);
    margin-bottom: 20px; animation: fadeDown 0.8s ease both;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .title-block { text-align: center; margin-bottom: 6px; animation: fadeDown 0.9s ease both; }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px; color: var(--green-dark); letter-spacing: 3px;
  }
  .title-block .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 12px; color: var(--gold); letter-spacing: 4px;
    text-transform: uppercase; margin-top: 4px;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 14px 0 22px; width: 100%; animation: fadeDown 1s ease both;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--green-dark), transparent);
  }

  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .link-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px; border-radius: 16px;
    text-decoration: none; transition: all 0.3s ease;
    border: 1.5px solid transparent; cursor: pointer;
  }
  .link-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(26,58,42,0.2); }
  .btn-facebook  { background: var(--green-dark); border-color: var(--green-mid); animation: fadeUp 1.1s ease both; }
  .btn-instagram { background: linear-gradient(135deg, var(--green-mid), var(--green-dark)); border-color: var(--gold); animation: fadeUp 1.2s ease both; }
  .btn-menu      { background: var(--cream-dark); border: 1.5px solid var(--green-dark); animation: fadeUp 1.3s ease both; }
  .btn-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .btn-facebook .btn-icon  { background: rgba(255,255,255,0.15); }
  .btn-instagram .btn-icon { background: rgba(201,168,76,0.2); }
  .btn-menu .btn-icon      { background: var(--green-dark); color: white; font-size: 20px; }
  .btn-text { flex: 1; }
  .btn-label    { font-size: 16px; font-weight: 700; display: block; }
  .btn-sublabel { font-size: 12px; display: block; margin-top: 2px; }
  .btn-facebook .btn-label,  .btn-instagram .btn-label  { color: white; }
  .btn-facebook .btn-sublabel, .btn-instagram .btn-sublabel { color: rgba(255,255,255,0.6); }
  .btn-menu .btn-label    { color: var(--green-dark); }
  .btn-menu .btn-sublabel { color: var(--green-light); }
  .btn-arrow { font-size: 18px; transition: transform 0.3s; }
  .btn-facebook .btn-arrow, .btn-instagram .btn-arrow { color: rgba(255,255,255,0.5); }
  .btn-menu .btn-arrow { color: var(--green-dark); }
  .link-btn:hover .btn-arrow { transform: translateX(-4px); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.96); z-index: 200;
    flex-direction: column; align-items: center;
    touch-action: none;
  }
  .modal-overlay.active { display: flex; }

  .modal-topbar {
    width: 100%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px; max-width: 520px; margin: 0 auto;
  }
  .modal-close {
    background: var(--green-dark); color: white; border: none;
    border-radius: 30px; padding: 9px 24px;
    font-size: 15px; font-family: 'Tajawal', sans-serif;
    font-weight: 700; cursor: pointer;
  }
  .modal-tabs { display: flex; gap: 8px; align-items: center; }
  .modal-tab {
    padding: 7px 20px; border-radius: 20px;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    cursor: pointer; transition: all 0.25s ease; user-select: none;
  }
  .modal-tab.active { color: white; background: var(--green-dark); border-color: var(--green-dark); }

  /* ===== BOOK ===== */
  .book-wrapper {
    flex: 1; width: 100%; display: flex;
    align-items: center; justify-content: center;
    overflow: hidden;
    padding: 10px 20px;
  }

  /* The 3D scene */
  .book-scene {
    position: relative;
    width: 100%;
    max-width: 480px;
    perspective: 1400px;
    perspective-origin: center center;
  }

  /* Static back page (page 2) always visible beneath */
  .back-page {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .back-page img { width: 100%; display: block; pointer-events: none; }

  /* The flipping page sits absolutely on top */
  .flip-page {
    position: absolute;
    top: 0; left: 0; right: 0;
    border-radius: 12px;
    overflow: hidden;
    transform-origin: left center; /* flip from LEFT edge (RTL: page turns left) */
    transform-style: preserve-3d;
    box-shadow: 6px 0 30px rgba(0,0,0,0.5);
    cursor: grab;
    user-select: none;
    will-change: transform;
    transition: box-shadow 0.2s;
    -webkit-user-drag: none;
  }
  .flip-page.animating {
    transition: transform 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                box-shadow 0.3s ease;
  }
  .flip-page:active { cursor: grabbing; }

  /* Front face */
  .flip-front {
    width: 100%;
    display: block;
    pointer-events: none;
    backface-visibility: hidden;
  }
  .flip-front img { width: 100%; display: block; }

  /* Back face (reverse of page 1 — shows when flipped) */
  .flip-back {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    backface-visibility: hidden;
    transform: rotateY(180deg);
    background: #1a3a2a;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .flip-back-inner {
    color: var(--gold); font-family: 'Playfair Display', serif;
    font-size: 22px; text-align: center; opacity: 0.5;
  }

  /* Live shadow under flip page while dragging */
  .flip-page.dragging {
    box-shadow: 12px 0 50px rgba(0,0,0,0.7);
  }

  .swipe-hint {
    flex-shrink: 0; text-align: center;
    color: rgba(255,255,255,0.4); font-size: 12px;
    padding: 8px 0 14px; letter-spacing: 1px;
  }

  .footer { margin-top: 28px; text-align: center; animation: fadeUp 1.6s ease both; position: relative; z-index: 1; }
  .footer-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .footer-divider::before, .footer-divider::after { content: ''; flex: 1; height: 1px; background: var(--cream-dark); }
  .footer p { font-size: 11px; color: #aaa; letter-spacing: 1px; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
</style>

<script>
/* ============================================================
   AUDIO ENGINE
   ============================================================ */
let audioCtx = null;
let musicNodes = null;
let musicPlaying = false;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

/* --- Page flip sound (realistic paper crinkle) --- */
function playPageFlip() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const duration = 0.45;
  const sr = ctx.sampleRate;
  const bufferSize = sr * duration;
  const buffer = ctx.createBuffer(1, bufferSize, sr);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    const t = i / sr;
    // Layered: initial hit, whoosh sweep, paper crinkle tail
    const hit      = Math.exp(-t * 80) * (Math.random() * 2 - 1) * 1.2;
    const sweep    = Math.exp(-t * 6) * Math.sin(2 * Math.PI * (350 - 280 * t) * t) * 0.5;
    const crinkle  = Math.exp(-t * 18) * (Math.random() * 2 - 1) * 0.6;
    const rustle   = Math.exp(-t * 9) * Math.sin(2 * Math.PI * (1200 + 300 * Math.sin(t * 40)) * t) * 0.2;
    data[i] = (hit + sweep + crinkle + rustle) * 0.55;
  }

  const source = ctx.createBufferSource();
  source.buffer = buffer;

  // Bandpass to make it "papery"
  const bpf = ctx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 900;
  bpf.Q.value = 0.7;

  // Soft high shelf for brightness
  const hpf = ctx.createBiquadFilter();
  hpf.type = 'highshelf';
  hpf.frequency.value = 3000;
  hpf.gain.value = 4;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.7, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

  source.connect(bpf);
  bpf.connect(hpf);
  hpf.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

/* --- Background café music --- */
function createCafeMusic() {
  const ctx = getAudioCtx();

  const masterGain = ctx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(ctx.destination);
  // Fade in
  masterGain.gain.linearRampToValueAtTime(0.11, ctx.currentTime + 2);

  // Warm reverb via feedback delay
  const delay = ctx.createDelay(0.6);
  delay.delayTime.value = 0.35;
  const delayGain = ctx.createGain();
  delayGain.gain.value = 0.22;
  delay.connect(delayGain);
  delayGain.connect(delay);
  delayGain.connect(masterGain);

  // Low-pass on delay for warmth
  const delayLPF = ctx.createBiquadFilter();
  delayLPF.type = 'lowpass';
  delayLPF.frequency.value = 2200;
  delayGain.connect(delayLPF);
  delayLPF.connect(masterGain);

  function playNote(freq, dur, vol, type, when) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.06);
    g.gain.setValueAtTime(vol * 0.7, when + dur * 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    osc.connect(g);
    g.connect(delay);
    g.connect(masterGain);
    osc.start(when);
    osc.stop(when + dur + 0.15);
    return osc;
  }

  // Jazz chord progressions (Am9, Fmaj7, Cmaj7, G7)
  const progressions = [
    // Am9: A C E G B
    [220.00, 261.63, 329.63, 392.00, 493.88],
    // Fmaj7: F A C E
    [174.61, 220.00, 261.63, 329.63, 392.00],
    // Cmaj7: C E G B
    [261.63, 329.63, 392.00, 493.88, 587.33],
    // G7: G B D F
    [196.00, 246.94, 293.66, 349.23, 440.00],
  ];

  const bassLines = [
    [55.00, 65.41, 73.42, 82.41],   // Am
    [43.65, 55.00, 65.41, 73.42],   // F
    [65.41, 73.42, 82.41, 98.00],   // C
    [49.00, 61.74, 73.42, 82.41],   // G
  ];

  let chordIdx = 0;
  let bassIdx  = 0;
  let beatCount = 0;

  function scheduleChord() {
    const now = ctx.currentTime;
    const chord = progressions[chordIdx % progressions.length];
    // Arpeggiate softly
    chord.forEach((f, i) => {
      const oct = i < 2 ? 1 : (i < 4 ? 2 : 4);
      playNote(f * oct, 2.2, 0.022 + i * 0.003, 'sine', now + i * 0.06);
    });
    // Melody on top
    const mel = chord[2] * 4;
    playNote(mel, 1.4, 0.018, 'triangle', now + 0.15);
    if (Math.random() > 0.5) {
      playNote(chord[3] * 4, 0.9, 0.012, 'triangle', now + 0.8);
    }
    chordIdx++;
  }

  function scheduleBass() {
    const now = ctx.currentTime;
    const prog = bassLines[Math.floor(beatCount / 4) % bassLines.length];
    const note = prog[beatCount % prog.length];
    // Upright bass: fundamental + gentle 2nd harmonic
    playNote(note, 0.5, 0.065, 'triangle', now);
    playNote(note * 2, 0.3, 0.015, 'sine', now);
    beatCount++;
  }

  function scheduleHihat(soft) {
    const now = ctx.currentTime;
    const bufSize = Math.floor(ctx.sampleRate * 0.04);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.25));
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const hpf2 = ctx.createBiquadFilter();
    hpf2.type = 'highpass';
    hpf2.frequency.value = soft ? 6000 : 9000;
    const hg = ctx.createGain();
    hg.gain.value = soft ? 0.04 : 0.07;
    src.connect(hpf2); hpf2.connect(hg); hg.connect(masterGain);
    src.start(now);
  }

  let beat16 = 0;
  const chordTimer = setInterval(scheduleChord, 2400);
  const bassTimer  = setInterval(scheduleBass, 600);
  const hatTimer   = setInterval(() => {
    scheduleHihat(beat16 % 2 !== 0);
    beat16++;
  }, 300);

  // Kick off immediately
  scheduleChord();
  scheduleBass();

  return { masterGain, chordTimer, bassTimer, hatTimer };
}

function startMusic() {
  if (musicPlaying) return;
  const ctx = getAudioCtx();
  const resume = ctx.state === 'suspended' ? ctx.resume() : Promise.resolve();
  resume.then(() => {
    musicNodes = createCafeMusic();
    musicPlaying = true;
  });
}

function stopMusic() {
  if (!musicPlaying || !musicNodes) return;
  clearInterval(musicNodes.chordTimer);
  clearInterval(musicNodes.bassTimer);
  clearInterval(musicNodes.hatTimer);
  try {
    musicNodes.masterGain.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 0.6);
  } catch(e) {}
  musicPlaying = false;
  musicNodes = null;
}

/* Auto-start on first interaction */
let musicStarted = false;
function tryStartMusic() {
  if (musicStarted) return;
  musicStarted = true;
  startMusic();
}
document.addEventListener('click',      tryStartMusic, { once: true });
document.addEventListener('touchstart', tryStartMusic, { once: true, passive: true });

/* Stop when tab is hidden / closed */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopMusic();
    musicStarted = false; // allow restart when they come back
  }
});
window.addEventListener('pagehide', stopMusic);
window.addEventListener('beforeunload', () => {
  stopMusic();
  if (audioCtx) { try { audioCtx.close(); } catch(e){} }
});

/* ============================================================
   LEAVES
   ============================================================ */
(function(){
  const container = document.getElementById('leavesContainer');
  const colors = ['#2d5a3d','#4a7c59','#1a3a2a','#6aab7a','#c9a84c'];
  const leafPath = 'M10,1 C10,1 20,8 18,18 C16,28 8,30 5,25 C2,20 4,10 10,1 Z';

  function createLeaf() {
    const div = document.createElement('div');
    div.className = 'leaf';
    const size = 14 + Math.random() * 18;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const duration = 6 + Math.random() * 8;
    const delay = Math.random() * 10;
    div.style.cssText = `left:${left}vw;top:0;width:${size}px;height:${size}px;
      animation-duration:${duration}s;animation-delay:${delay}s;`;
    div.innerHTML = `<svg viewBox="0 0 20 30" width="${size}" height="${size}">
      <path d="${leafPath}" fill="${color}" opacity="0.75"/></svg>`;
    container.appendChild(div);
    setTimeout(() => div.remove(), (duration + delay + 1) * 1000);
  }

  for (let i = 0; i < 12; i++) setTimeout(createLeaf, i * 600);
  setInterval(createLeaf, 1200);
})();

/* ============================================================
   REALISTIC PAGE FLIP with DRAG
   ============================================================ */
const modal    = document.getElementById('menuModal');
const flipPage = document.getElementById('flipPage');
const tabs     = [document.getElementById('tab0'), document.getElementById('tab1')];
const hint     = document.getElementById('swipeHint');

let currentPage  = 0;   // 0 = showing page1 on top, 1 = flipped away
let isAnimating  = false;

// Drag state
let dragActive   = false;
let dragStartX   = 0;
let dragStartY   = 0;
let dragCurrentX = 0;
let pageWidth    = 0;

/* Map horizontal drag distance → rotation angle
   Full drag across = -180deg (fully flipped)
   Clamped to [-180, 0] for forward flip, [0,5] for slight reverse wobble */
function dragToAngle(dx) {
  if (currentPage === 0) {
    // Dragging left flips forward (dx negative → angle more negative)
    const maxDrag = pageWidth || 300;
    const raw = (dx / maxDrag) * 180;
    return Math.max(-180, Math.min(5, raw));
  } else {
    // Page already flipped, dragging right unflips (dx positive → angle toward 0 from -180)
    const maxDrag = pageWidth || 300;
    const raw = -180 + (dx / maxDrag) * 180;
    return Math.max(-180, Math.min(5, raw));
  }
}

function setFlipAngle(deg, withTransition) {
  if (withTransition) {
    flipPage.classList.add('animating');
  } else {
    flipPage.classList.remove('animating');
  }
  // perspective skew: as angle approaches -90 the page narrows (realistic)
  flipPage.style.transform = `rotateY(${deg}deg)`;

  // Live shadow intensity
  const progress = Math.abs(deg) / 180;
  const shadowBlur = 6 + progress * 44;
  const shadowOpacity = 0.4 + progress * 0.35;
  flipPage.style.boxShadow = dragActive
    ? `${6 + progress*10}px 0 ${shadowBlur}px rgba(0,0,0,${shadowOpacity})`
    : '';
}

function completeFLip(toPage) {
  isAnimating = true;
  const targetAngle = toPage === 1 ? -180 : 0;
  setFlipAngle(targetAngle, true);

  playPageFlip();

  currentPage = toPage;
  updateTabs();

  setTimeout(() => {
    isAnimating = false;
    flipPage.classList.remove('animating');
    // Hide flip page when fully flipped (page 2 visible)
    flipPage.style.visibility = currentPage === 1 ? 'hidden' : 'visible';
  }, 680);
}

function updateTabs() {
  tabs[0].classList.toggle('active', currentPage === 0);
  tabs[1].classList.toggle('active', currentPage === 1);
  hint.textContent = currentPage === 0
    ? '📖 اسحب الصفحة يساراً للتقليب'
    : '📖 اسحب يميناً للرجوع';
}

function goTo(idx) {
  if (idx === currentPage || isAnimating) return;
  flipPage.style.visibility = 'visible';
  completeFLip(idx);
}

/* --- Pointer/Touch events on flip page --- */
function getClientX(e) {
  return e.touches ? e.touches[0].clientX : e.clientX;
}
function getClientY(e) {
  return e.touches ? e.touches[0].clientY : e.clientY;
}

flipPage.addEventListener('mousedown',  onDragStart, { passive: false });
flipPage.addEventListener('touchstart', onDragStart, { passive: false });

function onDragStart(e) {
  if (isAnimating) return;
  if (currentPage === 1) {
    // Page is hidden, shouldn't receive events — but just in case
    return;
  }
  e.preventDefault();
  dragActive   = true;
  dragStartX   = getClientX(e);
  dragStartY   = getClientY(e);
  dragCurrentX = dragStartX;
  pageWidth    = flipPage.offsetWidth;
  flipPage.classList.add('dragging');
  flipPage.style.visibility = 'visible';
}

document.addEventListener('mousemove',  onDragMove, { passive: false });
document.addEventListener('touchmove',  onDragMove, { passive: false });

function onDragMove(e) {
  if (!dragActive) return;
  e.preventDefault();
  dragCurrentX = getClientX(e);
  const dx = dragCurrentX - dragStartX;
  const angle = dragToAngle(dx);
  setFlipAngle(angle, false);
}

document.addEventListener('mouseup',   onDragEnd);
document.addEventListener('touchend',  onDragEnd);
document.addEventListener('touchcancel', onDragEnd);

function onDragEnd(e) {
  if (!dragActive) return;
  dragActive = false;
  flipPage.classList.remove('dragging');

  const dx = dragCurrentX - dragStartX;
  const angle = dragToAngle(dx);

  // Decide whether to complete or snap back
  // Threshold: 25% of width OR fast swipe
  const threshold = (pageWidth || 300) * 0.25;
  const completed = Math.abs(dx) > threshold;

  if (currentPage === 0 && dx < -threshold) {
    // Flip forward to page 2
    completeFLip(1);
  } else if (currentPage === 1 && dx > threshold) {
    // Flip back to page 1
    completeFLip(0);
  } else {
    // Snap back
    isAnimating = true;
    setFlipAngle(currentPage === 0 ? 0 : -180, true);
    setTimeout(() => {
      isAnimating = false;
      flipPage.classList.remove('animating');
    }, 680);
  }
}

/* Also allow tap on the book area to flip (for non-drag users) */
document.getElementById('bookScene').addEventListener('click', function(e) {
  if (isAnimating) return;
  if (dragCurrentX !== dragStartX) return; // was a drag, not a click
  goTo(currentPage === 0 ? 1 : 0);
});

/* Tab buttons */
tabs[0].addEventListener('click', (e) => { e.stopPropagation(); goTo(0); });
tabs[1].addEventListener('click', (e) => { e.stopPropagation(); goTo(1); });

/* ============================================================
   MODAL OPEN / CLOSE
   ============================================================ */
function openMenu() {
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  // Reset to page 1
  currentPage = 0;
  isAnimating = false;
  flipPage.style.visibility = 'visible';
  flipPage.classList.remove('animating', 'dragging');
  setFlipAngle(0, false);
  updateTabs();
  tryStartMusic(); // ensure music starts
}

function closeMenu() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

modal.addEventListener('click', function(e) {
  if (e.target === modal) closeMenu();
});
</script>
