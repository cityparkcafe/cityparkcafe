<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Park Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a7c59;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --gold: #c9a84c;
  }

  .leaf {
    position: fixed; pointer-events: none; z-index: 0; opacity: 0;
    animation: leafFall linear infinite;
  }
  .leaf svg { display: block; }
  @keyframes leafFall {
    0%   { transform: translateY(-60px) rotate(0deg) translateX(0px);   opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  /* Background image with overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url('https://cityparkcafe.github.io/background-image-/FB_IMG_1779610384065.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.13;
    pointer-events: none;
    z-index: 0;
  }

  body {
    min-height: 100vh; background: var(--cream);
    font-family: 'Tajawal', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 60px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(74,124,89,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(26,58,42,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    width: 100%; max-width: 440px;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
  }
  .logo-wrap {
    width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
    border: 4px solid var(--green-dark);
    box-shadow: 0 8px 30px rgba(26,58,42,0.2), 0 0 0 2px var(--gold);
    margin-bottom: 20px; animation: fadeDown 0.8s ease both;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .title-block { text-align: center; margin-bottom: 6px; animation: fadeDown 0.9s ease both; }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px; color: var(--green-dark); letter-spacing: 3px;
  }
  .title-block .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 12px; color: var(--gold); letter-spacing: 4px;
    text-transform: uppercase; margin-top: 4px;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 14px 0 22px; width: 100%; animation: fadeDown 1s ease both;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--green-dark), transparent);
  }

  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .link-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px; border-radius: 16px;
    text-decoration: none; transition: all 0.3s ease;
    border: 1.5px solid transparent; cursor: pointer;
  }
  .link-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(26,58,42,0.2); }
  .btn-facebook  { background: var(--green-dark); border-color: var(--green-mid); animation: fadeUp 1.1s ease both; }
  .btn-instagram { background: linear-gradient(135deg, var(--green-mid), var(--green-dark)); border-color: var(--gold); animation: fadeUp 1.2s ease both; }
  .btn-menu      { background: var(--cream-dark); border: 1.5px solid var(--green-dark); animation: fadeUp 1.3s ease both; }
  .btn-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .btn-facebook .btn-icon  { background: rgba(255,255,255,0.15); }
  .btn-instagram .btn-icon { background: rgba(201,168,76,0.2); }
  .btn-menu .btn-icon      { background: var(--green-dark); color: white; font-size: 20px; }
  .btn-text { flex: 1; }
  .btn-label    { font-size: 16px; font-weight: 700; display: block; }
  .btn-sublabel { font-size: 12px; display: block; margin-top: 2px; }
  .btn-facebook .btn-label,  .btn-instagram .btn-label  { color: white; }
  .btn-facebook .btn-sublabel, .btn-instagram .btn-sublabel { color: rgba(255,255,255,0.6); }
  .btn-menu .btn-label    { color: var(--green-dark); }
  .btn-menu .btn-sublabel { color: var(--green-light); }
  .btn-arrow { font-size: 18px; transition: transform 0.3s; }
  .btn-facebook .btn-arrow, .btn-instagram .btn-arrow { color: rgba(255,255,255,0.5); }
  .btn-menu .btn-arrow { color: var(--green-dark); }
  .link-btn:hover .btn-arrow { transform: translateX(-4px); }

  /* Sound toggle button */
  .sound-btn {
    position: fixed; bottom: 20px; left: 20px; z-index: 300;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--green-dark); border: 2px solid var(--gold);
    color: white; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }
  .sound-btn:hover { transform: scale(1.1); }
  .sound-btn.muted { background: #555; border-color: #888; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.96); z-index: 200;
    flex-direction: column; align-items: center;
    touch-action: none;
  }
  .modal-overlay.active { display: flex; }

  .modal-topbar {
    width: 100%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px; max-width: 520px; margin: 0 auto;
  }
  .modal-close {
    background: var(--green-dark); color: white; border: none;
    border-radius: 30px; padding: 9px 24px;
    font-size: 15px; font-family: 'Tajawal', sans-serif;
    font-weight: 700; cursor: pointer;
  }
  .modal-tabs { display: flex; gap: 8px; align-items: center; }
  .modal-tab {
    padding: 7px 20px; border-radius: 20px;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    cursor: pointer; transition: all 0.25s ease; user-select: none;
  }
  .modal-tab.active { color: white; background: var(--green-dark); border-color: var(--green-dark); }

  /* ===== BOOK ===== */
  .book-wrapper {
    flex: 1; width: 100%; display: flex;
    align-items: center; justify-content: center;
    overflow: hidden; padding: 10px 20px;
  }

  .book-scene {
    position: relative;
    width: 100%;
    max-width: 480px;
    perspective: 1400px;
    perspective-origin: center center;
  }

  .back-page {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .back-page img { width: 100%; display: block; pointer-events: none; }

  .flip-page {
    position: absolute;
    top: 0; left: 0; right: 0;
    border-radius: 12px;
    overflow: hidden;
    transform-origin: left center;
    transform-style: preserve-3d;
    box-shadow: 6px 0 30px rgba(0,0,0,0.5);
    cursor: grab;
    user-select: none;
    will-change: transform;
    -webkit-user-drag: none;
  }
  .flip-page.animating {
    transition: transform 0.65s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                box-shadow 0.3s ease;
  }
  .flip-page:active { cursor: grabbing; }

  .flip-front {
    width: 100%;
    display: block;
    pointer-events: none;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .flip-front img { width: 100%; display: block; }

  .flip-back {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: rotateY(180deg);
    background: #1a3a2a;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .flip-back-inner {
    color: var(--gold); font-family: 'Playfair Display', serif;
    font-size: 22px; text-align: center; opacity: 0.5;
  }

  .flip-page.dragging {
    box-shadow: 12px 0 50px rgba(0,0,0,0.7);
  }

  .swipe-hint {
    flex-shrink: 0; text-align: center;
    color: rgba(255,255,255,0.4); font-size: 12px;
    padding: 8px 0 14px; letter-spacing: 1px;
  }

  .footer { margin-top: 28px; text-align: center; animation: fadeUp 1.6s ease both; position: relative; z-index: 1; }
  .footer-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .footer-divider::before, .footer-divider::after { content: ''; flex: 1; height: 1px; background: var(--cream-dark); }
  .footer p { font-size: 11px; color: #aaa; letter-spacing: 1px; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
</style>

<script>
/* ============================================================
   AUDIO
   ============================================================ */
let audioCtx = null;
let musicNodes = null;
let musicOn = false;
const soundBtn = document.getElementById('soundBtn');

function getOrCreateCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function toggleSound() {
  if (musicOn) { stopMusic(); } else { startMusic(); }
}

function startMusic() {
  if (musicOn) return;
  const ctx = getOrCreateCtx();
  const resume = ctx.state === 'suspended' ? ctx.resume() : Promise.resolve();
  resume.then(() => {
    musicNodes = buildCafeMusic(ctx);
    musicOn = true;
    soundBtn.textContent = '🔊';
    soundBtn.classList.remove('muted');
  });
}

function stopMusic() {
  if (!musicOn || !musicNodes) return;
  try {
    clearInterval(musicNodes.chordTimer);
    clearInterval(musicNodes.bassTimer);
    clearInterval(musicNodes.hatTimer);
    const ctx = audioCtx;
    if (ctx && ctx.state !== 'closed') {
      musicNodes.masterGain.gain.cancelScheduledValues(ctx.currentTime);
      musicNodes.masterGain.gain.setValueAtTime(musicNodes.masterGain.gain.value, ctx.currentTime);
      musicNodes.masterGain.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
      setTimeout(() => { try { ctx.close(); } catch(e) {} audioCtx = null; }, 500);
    }
  } catch(e) {}
  musicOn = false; musicNodes = null;
  soundBtn.textContent = '🔇';
  soundBtn.classList.add('muted');
}

function buildCafeMusic(ctx) {
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(ctx.destination);
  masterGain.gain.linearRampToValueAtTime(0.11, ctx.currentTime + 2);

  const delay = ctx.createDelay(0.6); delay.delayTime.value = 0.35;
  const delayGain = ctx.createGain(); delayGain.gain.value = 0.22;
  delay.connect(delayGain); delayGain.connect(delay); delayGain.connect(masterGain);
  const delayLPF = ctx.createBiquadFilter(); delayLPF.type = 'lowpass'; delayLPF.frequency.value = 2200;
  delayGain.connect(delayLPF); delayLPF.connect(masterGain);

  function playNote(freq, dur, vol, type, when) {
    try {
      if (!ctx || ctx.state === 'closed') return;
      const osc = ctx.createOscillator(); const g = ctx.createGain();
      osc.type = type || 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(vol, when + 0.06);
      g.gain.setValueAtTime(vol * 0.7, when + dur * 0.5);
      g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
      osc.connect(g); g.connect(delay); g.connect(masterGain);
      osc.start(when); osc.stop(when + dur + 0.15);
    } catch(e) {}
  }

  const progressions = [
    [220.00,261.63,329.63,392.00,493.88],[174.61,220.00,261.63,329.63,392.00],
    [261.63,329.63,392.00,493.88,587.33],[196.00,246.94,293.66,349.23,440.00],
  ];
  const bassLines = [
    [55.00,65.41,73.42,82.41],[43.65,55.00,65.41,73.42],
    [65.41,73.42,82.41,98.00],[49.00,61.74,73.42,82.41],
  ];

  let chordIdx = 0, beatCount = 0, beat16 = 0;
  function scheduleChord() {
    if (!ctx || ctx.state === 'closed') return;
    const now = ctx.currentTime;
    const chord = progressions[chordIdx % progressions.length];
    chord.forEach((f,i) => {
      const oct = i<2?1:(i<4?2:4);
      playNote(f*oct, 2.2, 0.022+i*0.003, 'sine', now+i*0.06);
    });
    playNote(chord[2]*4,1.4,0.018,'triangle',now+0.15);
    if (Math.random()>0.5) playNote(chord[3]*4,0.9,0.012,'triangle',now+0.8);
    chordIdx++;
  }
  function scheduleBass() {
    if (!ctx || ctx.state === 'closed') return;
    const now = ctx.currentTime;
    const prog = bassLines[Math.floor(beatCount/4)%bassLines.length];
    const note = prog[beatCount%prog.length];
    playNote(note,0.5,0.065,'triangle',now); playNote(note*2,0.3,0.015,'sine',now);
    beatCount++;
  }
  function scheduleHihat(soft) {
    if (!ctx || ctx.state === 'closed') return;
    const now = ctx.currentTime;
    const bufSize = Math.floor(ctx.sampleRate * 0.04);
    const buf = ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(bufSize*0.25));
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=soft?6000:9000;
    const hg = ctx.createGain(); hg.gain.value=soft?0.04:0.07;
    src.connect(hpf); hpf.connect(hg); hg.connect(masterGain); src.start(now);
  }

  scheduleChord(); scheduleBass();
  const chordTimer = setInterval(scheduleChord, 2400);
  const bassTimer  = setInterval(scheduleBass, 600);
  const hatTimer   = setInterval(() => { scheduleHihat(beat16++%2!==0); }, 300);
  return { masterGain, chordTimer, bassTimer, hatTimer };
}

document.addEventListener('visibilitychange', () => { if (document.hidden) stopMusic(); });
window.addEventListener('pagehide', stopMusic);
window.addEventListener('beforeunload', () => {
  stopMusic();
  if (audioCtx && audioCtx.state !== 'closed') { try { audioCtx.close(); } catch(e) {} }
});

/* ============================================================
   صوت تقليب الورقة — واقعي جداً
   ============================================================ */
function playPageFlip() {
  let ctx;
  try {
    ctx = getOrCreateCtx();
    if (ctx.state === 'suspended') ctx.resume();
  } catch(e) { return; }

  const sr = ctx.sampleRate;
  const totalDur = 0.7;
  const frames = Math.floor(sr * totalDur);

  // نعمل buffer ستيريو
  const buf = ctx.createBuffer(2, frames, sr);

  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    const panFactor = ch === 0 ? 1.0 : 0.75; // يسار أعلى (اتجاه السحب)

    for (let i = 0; i < frames; i++) {
      const t = i / sr;
      const rnd = () => Math.random() * 2 - 1;

      // === طبقة 1: ضربة البداية الحادة (snap) ===
      const snap = Math.exp(-t * 180) * rnd() * 1.8;

      // === طبقة 2: حفيف الورقة أثناء الطي (whoosh swept) ===
      // تردد يبدأ عالي وبينزل مع حركة الورقة
      const sweepFreq = 1200 * Math.exp(-t * 4.5);
      const whoosh = Math.exp(-t * 9) * Math.sin(2 * Math.PI * sweepFreq * t) * 0.55;

      // === طبقة 3: حفيف الهواء (air rush) ===
      // ضوضاء مفلترة تحاكي انتقال الهواء
      const airNoise = Math.exp(-t * 6) * rnd() * 0.4;

      // === طبقة 4: تكشكش الورق خلال الحركة (paper crinkle) ===
      // نبضات صغيرة متقطعة
      const crinkleEnv = Math.exp(-t * 18) * (Math.random() > 0.65 ? 1 : 0);
      const crinkle = crinkleEnv * rnd() * 0.6;

      // === طبقة 5: ارتطام النهاية (landing thud) ===
      // الورقة تستقر في النهاية
      const landingT = t - 0.38;
      const landing = landingT > 0
        ? Math.exp(-landingT * 60) * rnd() * 0.9 + Math.exp(-landingT * 25) * Math.sin(2 * Math.PI * 280 * landingT) * 0.3
        : 0;

      // === طبقة 6: طقطقة خفيفة بعد الاستقرار (settle clicks) ===
      const settleT = t - 0.45;
      const settle = settleT > 0 && settleT < 0.15
        ? Math.exp(-settleT * 80) * rnd() * 0.25
        : 0;

      d[i] = (snap + whoosh + airNoise + crinkle + landing + settle) * panFactor * 0.45;
    }
  }

  const src = ctx.createBufferSource();
  src.buffer = buf;

  // High-pass لإزالة الترددات الدنيا الزائدة
  const hpf = ctx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = 150;

  // Band-pass لتركيز صوت الورق الطبيعي
  const bpf = ctx.createBiquadFilter();
  bpf.type = 'peaking';
  bpf.frequency.value = 2500;
  bpf.Q.value = 0.8;
  bpf.gain.value = 6;

  // High shelf لإضافة وضوح وحدة
  const shelf = ctx.createBiquadFilter();
  shelf.type = 'highshelf';
  shelf.frequency.value = 5000;
  shelf.gain.value = 4;

  // Low-pass لتلطيف الحواف الحادة
  const lpf = ctx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 8000;

  // Compressor لتوحيد مستوى الصوت
  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -18;
  comp.knee.value = 8;
  comp.ratio.value = 4;
  comp.attack.value = 0.002;
  comp.release.value = 0.1;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(1.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + totalDur);

  src.connect(hpf);
  hpf.connect(bpf);
  bpf.connect(shelf);
  shelf.connect(lpf);
  lpf.connect(comp);
  comp.connect(gain);
  gain.connect(ctx.destination);
  src.start();
}

/* ============================================================
   LEAVES
   ============================================================ */
(function(){
  const container = document.getElementById('leavesContainer');
  const colors = ['#2d5a3d','#4a7c59','#1a3a2a','#6aab7a','#c9a84c'];
  const leafPath = 'M10,1 C10,1 20,8 18,18 C16,28 8,30 5,25 C2,20 4,10 10,1 Z';
  function createLeaf() {
    const div = document.createElement('div');
    div.className = 'leaf';
    const size = 14 + Math.random() * 18;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const duration = 6 + Math.random() * 8;
    const delay = Math.random() * 10;
    div.style.cssText = `left:${left}vw;top:0;width:${size}px;height:${size}px;animation-duration:${duration}s;animation-delay:${delay}s;`;
    div.innerHTML = `<svg viewBox="0 0 20 30" width="${size}" height="${size}"><path d="${leafPath}" fill="${color}" opacity="0.75"/></svg>`;
    container.appendChild(div);
    setTimeout(() => div.remove(), (duration + delay + 1) * 1000);
  }
  for (let i = 0; i < 12; i++) setTimeout(createLeaf, i * 600);
  setInterval(createLeaf, 1200);
})();

/* ============================================================
   PAGE FLIP
   ============================================================ */
const modal    = document.getElementById('menuModal');
const flipPage = document.getElementById('flipPage');
const tabs     = [document.getElementById('tab0'), document.getElementById('tab1')];
const hint     = document.getElementById('swipeHint');

let currentPage  = 0;
let isAnimating  = false;
let dragActive   = false;
let dragStartX   = 0;
let dragCurrentX = 0;
let pageWidth    = 0;
let didDrag      = false;

function getClientX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

function calcAngle(dx) {
  const maxDrag = pageWidth || 300;
  if (currentPage === 0) {
    const raw = (dx / maxDrag) * 180;
    return Math.max(-180, Math.min(8, raw));
  } else {
    const raw = -180 + (dx / maxDrag) * 180;
    return Math.max(-180, Math.min(8, raw));
  }
}

function applyAngle(deg, animated) {
  if (animated) { flipPage.classList.add('animating'); }
  else { flipPage.classList.remove('animating'); }
  flipPage.style.transform = `rotateY(${deg}deg)`;
  if (!animated) {
    const progress = Math.abs(deg) / 180;
    const blur = 6 + progress * 44;
    const op   = 0.4 + progress * 0.35;
    flipPage.style.boxShadow = `${6 + progress*10}px 0 ${blur}px rgba(0,0,0,${op})`;
  }
}

function completeFLip(toPage) {
  isAnimating = true;
  flipPage.style.visibility = 'visible';
  const target = toPage === 1 ? -180 : 0;
  applyAngle(target, true);
  playPageFlip();
  currentPage = toPage;
  updateTabs();
  setTimeout(() => {
    isAnimating = false;
    flipPage.classList.remove('animating');
    flipPage.style.boxShadow = '';
    if (currentPage === 1) flipPage.style.visibility = 'hidden';
  }, 680);
}

function snapBack() {
  isAnimating = true;
  const target = currentPage === 0 ? 0 : -180;
  applyAngle(target, true);
  setTimeout(() => {
    isAnimating = false;
    flipPage.classList.remove('animating');
    flipPage.style.boxShadow = '';
  }, 680);
}

function updateTabs() {
  tabs[0].classList.toggle('active', currentPage === 0);
  tabs[1].classList.toggle('active', currentPage === 1);
  hint.textContent = currentPage === 0
    ? '📖 اسحب الصفحة يساراً للتقليب'
    : '📖 اسحب يميناً للرجوع للصفحة الأولى';
}

function goTo(idx) {
  if (idx === currentPage || isAnimating) return;
  flipPage.style.visibility = 'visible';
  completeFLip(idx);
}

function onDragStart(e) {
  if (isAnimating) return;
  e.preventDefault();
  dragActive = true; didDrag = false;
  dragStartX = getClientX(e); dragCurrentX = dragStartX;
  pageWidth = flipPage.offsetWidth || document.getElementById('bookScene').offsetWidth;
  flipPage.classList.add('dragging');
  flipPage.style.visibility = 'visible';
}

function onDragMove(e) {
  if (!dragActive) return;
  e.preventDefault();
  dragCurrentX = getClientX(e);
  const dx = dragCurrentX - dragStartX;
  if (Math.abs(dx) > 3) didDrag = true;
  applyAngle(calcAngle(dx), false);
}

function onDragEnd(e) {
  if (!dragActive) return;
  dragActive = false;
  flipPage.classList.remove('dragging');
  const dx = dragCurrentX - dragStartX;
  const threshold = (pageWidth || 300) * 0.22;
  if (currentPage === 0 && dx < -threshold) { completeFLip(1); }
  else if (currentPage === 1 && dx > threshold) { completeFLip(0); }
  else { snapBack(); }
}

flipPage.addEventListener('mousedown',  onDragStart, { passive: false });
flipPage.addEventListener('touchstart', onDragStart, { passive: false });

document.getElementById('bookScene').addEventListener('mousedown', function(e) {
  if (currentPage === 1 && !isAnimating) onDragStart(e);
}, { passive: false });
document.getElementById('bookScene').addEventListener('touchstart', function(e) {
  if (currentPage === 1 && !isAnimating) onDragStart(e);
}, { passive: false });

document.addEventListener('mousemove',   onDragMove,  { passive: false });
document.addEventListener('touchmove',   onDragMove,  { passive: false });
document.addEventListener('mouseup',     onDragEnd);
document.addEventListener('touchend',    onDragEnd);
document.addEventListener('touchcancel', onDragEnd);

document.getElementById('bookScene').addEventListener('click', function(e) {
  if (isAnimating) return;
  if (didDrag) { didDrag = false; return; }
  goTo(currentPage === 0 ? 1 : 0);
});

tabs[0].addEventListener('click', (e) => { e.stopPropagation(); goTo(0); });
tabs[1].addEventListener('click', (e) => { e.stopPropagation(); goTo(1); });

/* ============================================================
   MODAL
   ============================================================ */
function openMenu() {
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  currentPage = 0; isAnimating = false; dragActive = false;
  flipPage.style.visibility = 'visible';
  flipPage.classList.remove('animating', 'dragging');
  applyAngle(0, false);
  flipPage.style.boxShadow = '';
  updateTabs();
}

function closeMenu() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
  dragActive = false;
}

modal.addEventListener('click', function(e) {
  if (e.target === modal) closeMenu();
});
</script>
