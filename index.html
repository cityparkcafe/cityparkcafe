<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Park Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a7c59;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --gold: #c9a84c;
  }

  /* ===== LEAVES ===== */
  .leaf {
    position: fixed; pointer-events: none; z-index: 0; opacity: 0;
    animation: leafFall linear infinite;
  }
  .leaf svg { display: block; }
  @keyframes leafFall {
    0%   { transform: translateY(-60px) rotate(0deg) translateX(0px);   opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  /* ===== BASE ===== */
  body {
    min-height: 100vh; background: var(--cream);
    font-family: 'Tajawal', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 60px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(74,124,89,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(26,58,42,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    width: 100%; max-width: 440px;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
  }
  .logo-wrap {
    width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
    border: 4px solid var(--green-dark);
    box-shadow: 0 8px 30px rgba(26,58,42,0.2), 0 0 0 2px var(--gold);
    margin-bottom: 20px; animation: fadeDown 0.8s ease both;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .title-block { text-align: center; margin-bottom: 6px; animation: fadeDown 0.9s ease both; }
  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px; color: var(--green-dark); letter-spacing: 3px;
  }
  .title-block .subtitle {
    font-family: 'Playfair Display', serif;
    font-size: 12px; color: var(--gold); letter-spacing: 4px;
    text-transform: uppercase; margin-top: 4px;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 14px 0 22px; width: 100%; animation: fadeDown 1s ease both;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--green-dark), transparent);
  }

  /* ===== MUSIC BUTTON ===== */
  .music-btn {
    position: fixed; top: 16px; left: 16px; z-index: 999;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--green-dark); border: 2px solid var(--gold);
    color: white; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s, background 0.2s;
  }
  .music-btn:hover { transform: scale(1.1); background: var(--green-mid); }
  .music-btn.playing { animation: musicPulse 1.5s ease-in-out infinite; }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.2), 0 0 0 0 rgba(201,168,76,0.4); }
    50%       { box-shadow: 0 4px 15px rgba(0,0,0,0.2), 0 0 0 8px rgba(201,168,76,0); }
  }

  /* ===== BUTTONS ===== */
  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .link-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px; border-radius: 16px;
    text-decoration: none; transition: all 0.3s ease;
    border: 1.5px solid transparent; cursor: pointer;
  }
  .link-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(26,58,42,0.2); }
  .btn-facebook  { background: var(--green-dark); border-color: var(--green-mid); animation: fadeUp 1.1s ease both; }
  .btn-instagram { background: linear-gradient(135deg, var(--green-mid), var(--green-dark)); border-color: var(--gold); animation: fadeUp 1.2s ease both; }
  .btn-menu      { background: var(--cream-dark); border: 1.5px solid var(--green-dark); animation: fadeUp 1.3s ease both; }
  .btn-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .btn-facebook .btn-icon  { background: rgba(255,255,255,0.15); }
  .btn-instagram .btn-icon { background: rgba(201,168,76,0.2); }
  .btn-menu .btn-icon      { background: var(--green-dark); color: white; font-size: 20px; }
  .btn-text { flex: 1; }
  .btn-label    { font-size: 16px; font-weight: 700; display: block; }
  .btn-sublabel { font-size: 12px; display: block; margin-top: 2px; }
  .btn-facebook .btn-label,  .btn-instagram .btn-label  { color: white; }
  .btn-facebook .btn-sublabel, .btn-instagram .btn-sublabel { color: rgba(255,255,255,0.6); }
  .btn-menu .btn-label    { color: var(--green-dark); }
  .btn-menu .btn-sublabel { color: var(--green-light); }
  .btn-arrow { font-size: 18px; transition: transform 0.3s; }
  .btn-facebook .btn-arrow, .btn-instagram .btn-arrow { color: rgba(255,255,255,0.5); }
  .btn-menu .btn-arrow { color: var(--green-dark); }
  .link-btn:hover .btn-arrow { transform: translateX(-4px); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.95); z-index: 200;
    flex-direction: column; align-items: center;
  }
  .modal-overlay.active { display: flex; }

  .modal-topbar {
    width: 100%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px; max-width: 520px; margin: 0 auto;
  }
  .modal-close {
    background: var(--green-dark); color: white; border: none;
    border-radius: 30px; padding: 9px 24px;
    font-size: 15px; font-family: 'Tajawal', sans-serif;
    font-weight: 700; cursor: pointer;
  }
  .modal-tabs { display: flex; gap: 8px; align-items: center; }
  .modal-tab {
    padding: 7px 20px; border-radius: 20px;
    font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    cursor: pointer; transition: all 0.25s ease; user-select: none;
  }
  .modal-tab.active { color: white; background: var(--green-dark); border-color: var(--green-dark); }

  /* ===== PAGE FLIP BOOK ===== */
  .book-container {
    flex: 1; width: 100%; display: flex;
    align-items: center; justify-content: center;
    overflow: hidden; perspective: 1200px;
    padding: 10px;
  }
  .book {
    position: relative; width: 100%; max-width: 500px;
    height: 100%; display: flex; align-items: flex-start; justify-content: center;
  }
  .page {
    position: absolute; top: 0; width: 100%; max-width: 500px;
    border-radius: 14px; overflow: hidden;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                opacity 0.3s ease;
    backface-visibility: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .page img { width: 100%; display: block; }

  .page.page-0 { z-index: 2; transform: rotateY(0deg); opacity: 1; }
  .page.page-1 { z-index: 1; transform: rotateY(0deg); opacity: 1; }

  /* flip out: page 0 rotates away to left */
  .page.page-0.flipped {
    transform: rotateY(-180deg);
    opacity: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* swipe hint */
  .swipe-hint {
    flex-shrink: 0; text-align: center;
    color: rgba(255,255,255,0.4); font-size: 12px;
    padding: 8px 0 14px; letter-spacing: 1px;
  }

  /* ===== FOOTER ===== */
  .footer { margin-top: 28px; text-align: center; animation: fadeUp 1.6s ease both; position: relative; z-index: 1; }
  .footer-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .footer-divider::before, .footer-divider::after { content: ''; flex: 1; height: 1px; background: var(--cream-dark); }
  .footer p { font-size: 11px; color: #aaa; letter-spacing: 1px; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
</style>

<script>
/* ====== AUDIO ENGINE ====== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Page flip sound using Web Audio API
function playPageFlip() {
  const duration = 0.35;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    // Whoosh + crinkle effect
    const t = i / audioCtx.sampleRate;
    const envelope = Math.exp(-t * 12) * (1 - Math.exp(-t * 80));
    const noise = (Math.random() * 2 - 1);
    const crinkle = Math.sin(2 * Math.PI * 800 * t) * 0.15;
    const whoosh = Math.sin(2 * Math.PI * (200 + 600 * (1 - t / duration)) * t) * 0.1;
    data[i] = envelope * (noise * 0.7 + crinkle + whoosh);
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1200;
  filter.Q.value = 0.8;

  const gainNode = audioCtx.createGain();
  gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  source.connect(filter);
  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  source.start();
}

/* ====== BACKGROUND MUSIC ====== */
let musicPlaying = false;
let musicNodes = {};

function createCafeMusic() {
  const ctx = audioCtx;

  // Master gain
  const masterGain = ctx.createGain();
  masterGain.gain.value = 0.12;
  masterGain.connect(ctx.destination);

  // Soft reverb convolver simulation via delay
  const delay = ctx.createDelay(0.5);
  delay.delayTime.value = 0.3;
  const delayGain = ctx.createGain();
  delayGain.gain.value = 0.25;
  delay.connect(delayGain);
  delayGain.connect(delay);
  delayGain.connect(masterGain);

  // Jazz chord notes (Cmaj7: C E G B)
  const chordNotes = [261.63, 329.63, 392.00, 493.88];
  // Walking bass (C D E G A)
  const bassNotes = [65.41, 73.42, 82.41, 98.00, 110.00, 98.00, 82.41, 73.42];

  let bassIndex = 0;
  let chordStep = 0;

  function playNote(freq, dur, vol, type = 'sine', when) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, when);
    gain.gain.linearRampToValueAtTime(vol, when + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, when + dur);
    osc.connect(gain);
    gain.connect(delay);
    gain.connect(masterGain);
    osc.start(when);
    osc.stop(when + dur + 0.1);
  }

  // Soft piano-like chord every 2 seconds
  function scheduleChord() {
    const now = ctx.currentTime;
    const rootNotes = [
      [261.63, 329.63, 392.00, 493.88],  // Cmaj7
      [293.66, 369.99, 440.00, 523.25],  // Dmaj7
      [246.94, 311.13, 369.99, 466.16],  // Bm7
      [220.00, 277.18, 329.63, 415.30],  // Am7
    ];
    const chord = rootNotes[chordStep % rootNotes.length];
    chord.forEach((f, i) => {
      playNote(f, 1.8, 0.04 + i * 0.005, 'sine', now + i * 0.04);
    });
    // Soft high melody note
    playNote(chord[2] * 2, 1.2, 0.03, 'triangle', now + 0.1);
    chordStep++;
  }

  // Walking bass every beat
  function scheduleBass() {
    const now = ctx.currentTime;
    const freq = bassNotes[bassIndex % bassNotes.length];
    playNote(freq, 0.45, 0.06, 'triangle', now);
    playNote(freq * 2, 0.3, 0.02, 'sine', now);
    bassIndex++;
  }

  // Soft hi-hat
  function scheduleHihat() {
    const now = ctx.currentTime;
    const bufSize = ctx.sampleRate * 0.05;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const hpf = ctx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = 8000;
    const hg = ctx.createGain();
    hg.gain.value = 0.08;
    src.connect(hpf); hpf.connect(hg); hg.connect(masterGain);
    src.start(now);
  }

  const chordInterval = setInterval(scheduleChord, 2000);
  const bassInterval  = setInterval(scheduleBass,  500);
  const hatInterval   = setInterval(scheduleHihat, 250);

  scheduleChord();
  scheduleBass();

  return { masterGain, chordInterval, bassInterval, hatInterval };
}

function toggleMusic() {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const btn = document.getElementById('musicBtn');
  if (!musicPlaying) {
    musicNodes = createCafeMusic();
    musicPlaying = true;
    btn.textContent = '🔇';
    btn.classList.add('playing');
    btn.title = 'إيقاف الموسيقى';
  } else {
    clearInterval(musicNodes.chordInterval);
    clearInterval(musicNodes.bassInterval);
    clearInterval(musicNodes.hatInterval);
    musicNodes.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    musicPlaying = false;
    btn.textContent = '🎵';
    btn.classList.remove('playing');
    btn.title = 'تشغيل الموسيقى';
  }
}

// Auto-start music on first interaction
document.addEventListener('click', function startOnce() {
  if (!musicPlaying) {
    if (audioCtx.state === 'suspended') audioCtx.resume().then(() => {
      musicNodes = createCafeMusic();
      musicPlaying = true;
      const btn = document.getElementById('musicBtn');
      btn.textContent = '🔇';
      btn.classList.add('playing');
    });
    else {
      musicNodes = createCafeMusic();
      musicPlaying = true;
      const btn = document.getElementById('musicBtn');
      btn.textContent = '🔇';
      btn.classList.add('playing');
    }
  }
  document.removeEventListener('click', startOnce);
}, { once: true });

/* ====== LEAVES ====== */
(function(){
  const container = document.getElementById('leavesContainer');
  const colors = ['#2d5a3d','#4a7c59','#1a3a2a','#6aab7a','#c9a84c'];
  const leafPath = 'M10,1 C10,1 20,8 18,18 C16,28 8,30 5,25 C2,20 4,10 10,1 Z';

  function createLeaf() {
    const div = document.createElement('div');
    div.className = 'leaf';
    const size = 14 + Math.random() * 18;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = Math.random() * 100;
    const duration = 6 + Math.random() * 8;
    const delay = Math.random() * 10;
    div.style.cssText = `left:${left}vw; top:0; width:${size}px; height:${size}px;
      animation-duration:${duration}s; animation-delay:${delay}s;`;
    div.innerHTML = `<svg viewBox="0 0 20 30" width="${size}" height="${size}">
      <path d="${leafPath}" fill="${color}" opacity="0.75"/>
    </svg>`;
    container.appendChild(div);
    setTimeout(() => div.remove(), (duration + delay) * 1000);
  }

  for(let i=0; i<12; i++) setTimeout(createLeaf, i * 600);
  setInterval(createLeaf, 1200);
})();

/* ====== PAGE FLIP MENU ====== */
const modal = document.getElementById('menuModal');
const page0 = document.getElementById('page0');
const page1 = document.getElementById('page1');
const tabs  = [document.getElementById('tab0'), document.getElementById('tab1')];

let currentPage = 0;
let isFlipping   = false;

function goTo(idx) {
  if (idx === currentPage || isFlipping) return;
  isFlipping = true;

  if (audioCtx.state === 'suspended') audioCtx.resume();
  playPageFlip();

  if (idx === 1) {
    // Flip page 0 away → reveal page 1
    page0.classList.add('flipped');
    page1.style.zIndex = 1;
    page0.style.zIndex = 3;
  } else {
    // Flip back
    page0.classList.remove('flipped');
    page0.style.zIndex = 2;
    page1.style.zIndex = 1;
  }

  currentPage = idx;
  tabs[0].classList.toggle('active', idx === 0);
  tabs[1].classList.toggle('active', idx === 1);
  document.getElementById('swipeHint').textContent = idx === 0
    ? '📖 اضغط على الصفحة للتقليب'
    : '📖 اضغط للرجوع للصفحة الأولى';

  setTimeout(() => { isFlipping = false; }, 750);
}

// Tap on book to flip
document.getElementById('book').addEventListener('click', function() {
  goTo(currentPage === 0 ? 1 : 0);
});

// Tab clicks
tabs[0].addEventListener('click', () => goTo(0));
tabs[1].addEventListener('click', () => goTo(1));

function openMenu() {
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  // reset
  currentPage = 0;
  page0.classList.remove('flipped');
  page0.style.zIndex = 2;
  page1.style.zIndex = 1;
  tabs[0].classList.add('active');
  tabs[1].classList.remove('active');
  document.getElementById('swipeHint').textContent = '📖 اضغط على الصفحة للتقليب';
}

function closeMenu() {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

modal.addEventListener('click', function(e) {
  if (e.target === modal) closeMenu();
});
</script>

</body>
</html>
